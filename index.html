<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScaleX | Insights & Blogs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="site-header">
        <a class="brand" href="#" aria-label="ScaleX home">
            <img class="brand-mark" src="images/scalex.png" alt="" aria-hidden="true">
            <span>ScaleX</span>
        </a>

        <nav class="main-nav" aria-label="Primary navigation">
            <a href="#">Home</a>
            <a href="#">About Us</a>
            <a href="#">Blogs</a>
            <a href="#">Contact Us</a>
        </nav>

        <a class="header-cta" href="#">Get Started</a>
    </header>

    <main>
        <section class="hero" aria-labelledby="page-title">
            <h1 id="page-title">Insights &amp; Blogs</h1>

            <div class="category-tabs" aria-label="Blog categories">
                <a class="tab active" href="#">All</a>
                <a class="tab" href="#">Tech</a>
                <a class="tab" href="#">SaaS</a>
                <a class="tab wide" href="#">Marketing</a>
            </div>

            <div class="blog-grid">
                <article class="blog-card">
                    <div class="card-image">
                        <img src="images/1.png" alt="Martini glass in front of red tiles">
                    </div>
                    <div class="card-content">
                        <span class="tag">Tech</span>
                        <h2>The Ultimate Guide To SaaS Marketing</h2>
                        <time datetime="2025-05-23">May 23, 2025</time>
                    </div>
                </article>

                <article class="blog-card">
                    <div class="card-image">
                        <img src="images/2.png" alt="Green chair against orange background">
                    </div>
                    <div class="card-content">
                        <span class="tag">SaaS</span>
                        <h2>5 Key Trends In SaaS Growth For 2025</h2>
                        <time datetime="2025-05-23">May 23, 2025</time>
                    </div>
                </article>

                <article class="blog-card">
                    <div class="card-image">
                        <img src="images/3.png" alt="Orange cat against red background">
                    </div>
                    <div class="card-content">
                        <span class="tag">Marketing</span>
                        <h2>How Data-Driven Strategies Are Important</h2>
                        <time datetime="2025-05-23">May 23, 2025</time>
                    </div>
                </article>
            </div>
        </section>
    </main>
</body>

</html>
